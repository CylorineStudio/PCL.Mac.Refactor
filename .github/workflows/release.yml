name: Build and release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    outputs:
      build_number: ${{ steps.version.outputs.build_number }}
      version_number: ${{ steps.version.outputs.version_number }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version
        id: version
        run: |
          echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          version_number=$(grep '^MARKETING_VERSION' Configs/Base.xcconfig | cut -d '=' -f2 | xargs)
          echo "version_number=$version_number" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version_number" >> "$GITHUB_OUTPUT"

          echo "版本号：\t$version_number"
          echo "构建号：\t$(git rev-list --count HEAD)"
          echo "标签名：\tv$version_number"

      - name: Build app
        run: |
          xcodebuild \
            -project PCL.Mac.xcodeproj -scheme PCL.Mac -configuration Release \
            CURRENT_PROJECT_VERSION=${{ steps.version.outputs.build_number }} \
            -archivePath build archive

      - name: Prepare release assets
        run: |
          mv build.xcarchive/Products/Applications/PCL.Mac.app ./PCL.Mac.app
          zip -r "PCL.Mac-${{ steps.version.outputs.tag_name }}.zip" ./PCL.Mac.app/*
          mkdir dSYMs
          mv build.xcarchive/dSYMs/PCL.Mac.app.dSYM ./dSYMs/PCL.Mac.app.dSYM
          mv build.xcarchive/dSYMs/Core.framework.dSYM ./dSYMs/Core.framework.dSYM
          zip -r "PCL.Mac-${{ steps.version.outputs.tag_name }}-dSYMs.zip" ./dSYMs/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pclmac-build-${{ steps.version.outputs.tag_name }}
          path: |
            PCL.Mac-${{ steps.version.outputs.tag_name }}.zip
            PCL.Mac-${{ steps.version.outputs.tag_name }}-dSYMs.zip

  release:
    runs-on: macos-26
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pclmac-build-${{ needs.build.outputs.tag_name }}

      - name: Create release
        run: |
          gh release create "${{ needs.build.outputs.tag_name }}" \
            "PCL.Mac-${{ needs.build.outputs.tag_name }}.zip" \
            "PCL.Mac-${{ needs.build.outputs.tag_name }}-dSYMs.zip" \
            --title "${{ needs.build.outputs.version_number }}" \
            --generate-notes \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}