name: Build and release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get version
        run: |
          echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_ENV
          VERSION_NUMBER=$(grep '^MARKETING_VERSION' Configs/Base.xcconfig | cut -d '=' -f2 | xargs)
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION_NUMBER" >> $GITHUB_ENV
          
          echo "版本号：\t$VERSION_NUMBER"
          echo "构建号：\t$BUILD_NUMBER"
          echo "标签名：\t$TAG_NAME"

      - name: Build app
        run: |
          xcodebuild archive \
            -project PCL.Mac.xcodeproj -scheme PCL.Mac -configuration Release \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            -archivePath build

      - name: Prepare release assets
        run: |
          cp -r build.xcarchive/Products/Applications/PCL.Mac.app ./PCL.Mac.app
          zip -r "PCL.Mac-${{ env.TAG_NAME }}.zip" ./PCL.Mac.app/*
          zip -r build.xcarchive.zip ./build.xcarchive
      
      - name: Create release
        run: |
          gh release create $TAG_NAME \
            "PCL.Mac-${{ env.TAG_NAME }}.zip" \
            "build.xcarchive.zip" \
            --title $VERSION_NUMBER \
            --generate-notes \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
