name: Build and release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      build_configuration: Release
      upload_artifact: true
    secrets: inherit
  
  release:
    runs-on: macos-26
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get version
        run: |
          echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_ENV
          VERSION_NUMBER=$(grep '^MARKETING_VERSION' Configs/Base.xcconfig | cut -d '=' -f2 | xargs)
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION_NUMBER" >> $GITHUB_ENV
      
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: PCL.Mac-artifact.zip
          path: ./artifact
          skip-decompress: true
      
      - name: Notarize app
        run: |
          ditto -x -k ./artifact/PCL.Mac-artifact.zip ./artifact
          
          ditto -c -k --sequesterRsrc --keepParent ./artifact/PCL.Mac.app ./PCL.Mac.zip
          xcrun notarytool submit "./PCL.Mac.zip" \
            --apple-id "${{ secrets.MACOS_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.MACOS_NOTARY_PASSWORD }}" \
            --team-id "${{ secrets.MACOS_SIGNING_TEAM }}" \
            --wait
          xcrun stapler staple "./artifact/PCL.Mac.app"
      
      - name: Create DMG
        run: |
          mkdir dmg_temp

          ditto ./artifact/PCL.Mac.app dmg_temp/PCL.Mac.app
          ditto Packaging/DS_Store dmg_temp/.DS_Store
          ln -s /Applications "dmg_temp/将左边的 App 拖至此处"
          mkdir -p dmg_temp/.background
          cp Packaging/background.png dmg_temp/.background/background.png

          hdiutil create -volname "PCL.Mac" -srcfolder "dmg_temp" -ov -format UDZO "PCL.Mac-${{ env.TAG_NAME }}.dmg"
      
      - name: Process artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent ./artifact/PCL.Mac.app "./PCL.Mac-${{ env.TAG_NAME }}.zip"
          ditto -c -k --sequesterRsrc --keepParent ./artifact/build.xcarchive ./build.xcarchive.zip
      
      - name: Create release
        run: |
          gh release create $TAG_NAME \
            "PCL.Mac-${{ env.TAG_NAME }}.dmg" \
            "PCL.Mac-${{ env.TAG_NAME }}.zip" \
            "build.xcarchive.zip" \
            --title $VERSION_NUMBER \
            --generate-notes \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
